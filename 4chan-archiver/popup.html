<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4chan Archiver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #2a2a2a;
      --accent: #9b2335;
      --accent-bright: #d42b43;
      --text: #e8e8e8;
      --muted: #666;
      --green: #2ecc71;
      --yellow: #f39c12;
      --mono: 'Share Tech Mono', monospace;
      --head: 'Oswald', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--accent);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 100%;
      background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.3) 50%);
    }

    .header-icon {
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-title {
      font-family: var(--head);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
    }

    .header-sub {
      font-size: 9px;
      letter-spacing: 3px;
      opacity: 0.7;
      text-transform: uppercase;
    }

    /* Thread Info */
    .thread-info {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .thread-info.no-thread {
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 1px;
    }

    .thread-meta {
      width: 100%;
    }

    .thread-board {
      color: var(--accent-bright);
      font-weight: bold;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .thread-id {
      color: var(--muted);
      font-size: 10px;
    }

    .thread-title {
      color: var(--text);
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      padding: 8px 12px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }

    .stat-val {
      font-family: var(--head);
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-bright);
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Action buttons */
    .actions {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.15s;
    }

    .btn:hover {
      border-color: var(--accent-bright);
      background: #1a1a1a;
      color: #fff;
    }

    .btn:hover::before { transform: scaleY(1); }

    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn:disabled:hover { border-color: var(--border); background: var(--surface); }
    .btn:disabled::before { transform: scaleY(0) !important; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent-bright);
      border-color: var(--accent-bright);
    }

    .btn-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .btn-text { flex: 1; text-align: left; }

    .btn-badge {
      background: rgba(255,255,255,0.1);
      padding: 1px 5px;
      font-size: 9px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* Progress area */
    .progress-area {
      padding: 0 12px 12px;
      display: none;
    }

    .progress-area.visible { display: block; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      font-size: 10px;
      color: var(--muted);
    }

    .progress-label span:last-child { color: var(--accent-bright); }

    .progress-track {
      height: 3px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-bright));
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-fill.indeterminate {
      width: 40% !important;
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0% { transform: translateX(-200%); }
      100% { transform: translateX(350%); }
    }

    /* Log */
    .log {
      margin: 0 12px 12px;
      background: #0a0a0a;
      border: 1px solid var(--border);
      padding: 8px;
      height: 80px;
      overflow-y: auto;
      font-size: 10px;
      line-height: 1.6;
      display: none;
    }

    .log.visible { display: block; }

    .log-line { color: var(--muted); }
    .log-line.ok { color: var(--green); }
    .log-line.err { color: #e74c3c; }
    .log-line.info { color: var(--accent-bright); }

    .log::-webkit-scrollbar { width: 3px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); }

    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-status {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .footer-status.active { color: var(--green); }

    .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 4px;
      vertical-align: middle;
    }

    .dot.active {
      background: var(--green);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .version { font-size: 9px; color: #333; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">◈</div>
    <div>
      <div class="header-title">4ARCH</div>
      <div class="header-sub">Thread Archiver</div>
    </div>
  </div>

  <div class="thread-info no-thread" id="threadInfo">
    <span>⚠ NOT ON A 4CHAN THREAD</span>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-val" id="statPosts">–</div>
      <div class="stat-label">Posts</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statImages">–</div>
      <div class="stat-label">Images</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statVideos">–</div>
      <div class="stat-label">Videos</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnArchiveThread" disabled>
      <span class="btn-icon">📄</span>
      <span class="btn-text">Archive Thread (HTML)</span>
      <span class="btn-badge">FULL</span>
    </button>
    <button class="btn" id="btnDownloadMedia" disabled>
      <span class="btn-icon">🖼</span>
      <span class="btn-text">Download All Media</span>
      <span class="btn-badge" id="mediaBadge">0</span>
    </button>
    <button class="btn" id="btnDownloadImages" disabled>
      <span class="btn-icon">📷</span>
      <span class="btn-text">Images Only</span>
      <span class="btn-badge" id="imagesBadge">0</span>
    </button>
    <button class="btn" id="btnDownloadVideos" disabled>
      <span class="btn-icon">🎬</span>
      <span class="btn-text">Videos / WebMs Only</span>
      <span class="btn-badge" id="videosBadge">0</span>
    </button>
  </div>

  <div class="progress-area" id="progressArea">
    <div class="progress-label">
      <span id="progressText">Downloading...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="log" id="log"></div>

  <div class="footer">
    <div class="footer-status" id="footerStatus">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">IDLE</span>
    </div>
    <div class="version">v1.0.0</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
